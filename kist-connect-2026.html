<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>KIST CONNECT 2026</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
        background: #ffffff;
      }

      body {
        -webkit-text-size-adjust: 100%;
        overflow-x: hidden;
      }

      .connect-stage {
        width: 100vw;
        min-height: 100svh;
        display: grid;
        place-items: start center;
        margin: 0;
        padding: 0;
        background: #ffffff;
      }

      .connect-image-map {
        position: relative;
        display: block;
        width: 100vw;
        max-width: none;
        margin: 0 auto;
        padding: 0;
        line-height: 0;
        font-size: 0;
        overflow: hidden;
      }

      .connect-image {
        display: block;
        width: 100%;
        max-width: none;
        height: auto;
        margin: 0 auto;
        padding: 0;
        border: 0;
        outline: none;
        text-decoration: none;
      }

      .kist-hotspot {
        position: absolute;
        z-index: 2;
        display: block;
        box-sizing: border-box;
        background: rgba(113, 50, 245, 0);
        text-decoration: none;
        cursor: pointer;
        -webkit-tap-highlight-color: rgba(113, 50, 245, 0.18);
      }

      .kist-hotspot:focus-visible {
        outline: 3px solid rgba(113, 50, 245, 0.85);
        outline-offset: 2px;
      }

      .connect-image-map[data-debug="true"] .kist-hotspot {
        background: rgba(113, 50, 245, 0.2);
        border: 1px solid rgba(113, 50, 245, 0.75);
      }
    </style>
  </head>
  <body>
    <main class="connect-stage" aria-label="KIST CONNECT 2026">
      <div
        class="connect-image-map"
        id="kist-connect-map"
        data-base-width="600"
        data-fit-mode="width"
        data-debug="false"
      >
        <img
          id="kist-connect-image"
          class="connect-image"
          alt="KIST CONNECT 2026 Lab-to-Market"
          src="kist-connect-2026.png"
          width="600"
          border="0"
        >

        <a class="kist-hotspot" id="kist-link-1" href="https://jyhhsa.github.io/KISTpromotion/kist-smk-sample1.html" target="_blank" rel="noopener noreferrer" aria-label="KIST SMK sample 1" data-x="40" data-y="445" data-w="160" data-h="120"></a>
        <a class="kist-hotspot" id="kist-link-2" href="https://jyhhsa.github.io/KISTpromotion/kist-smk-sample2.html" target="_blank" rel="noopener noreferrer" aria-label="KIST SMK sample 2" data-x="219" data-y="445" data-w="160" data-h="120"></a>
        <a class="kist-hotspot" id="kist-link-3" href="https://jyhhsa.github.io/KISTpromotion/kist-smk-sample3.html" target="_blank" rel="noopener noreferrer" aria-label="KIST SMK sample 3" data-x="398" data-y="445" data-w="160" data-h="120"></a>
        <a class="kist-hotspot" id="kist-link-4" href="https://jyhhsa.github.io/KISTpromotion/kist-smk-sample4.html" target="_blank" rel="noopener noreferrer" aria-label="KIST SMK sample 4" data-x="40" data-y="578" data-w="160" data-h="119"></a>
        <a class="kist-hotspot" id="kist-link-5" href="https://jyhhsa.github.io/KISTpromotion/kist-smk-sample5.html" target="_blank" rel="noopener noreferrer" aria-label="KIST SMK sample 5" data-x="219" data-y="578" data-w="160" data-h="119"></a>
        <a class="kist-hotspot" id="kist-link-6" href="https://jyhhsa.github.io/KISTpromotion/kist-smk-sample6.html" target="_blank" rel="noopener noreferrer" aria-label="KIST SMK sample 6" data-x="398" data-y="578" data-w="160" data-h="119"></a>

        <a class="kist-hotspot" id="kist-link-8" href="https://form.naver.com/response/wDr_lo4H72tEgycEsCqaZQ" target="_blank" rel="noopener noreferrer" aria-label="참가 신청" data-x="306" data-y="721" data-w="201" data-h="51"></a>
      </div>
    </main>

    <script>
      (function () {
        const map = document.getElementById("kist-connect-map");
        const image = document.getElementById("kist-connect-image");
        const baseWidth = Number(map.dataset.baseWidth) || 600;
        const hotspots = Array.from(map.querySelectorAll(".kist-hotspot"));

        function getTargetWidth() {
          const fitMode = map.dataset.fitMode || "width";
          const viewportWidth = window.innerWidth || document.documentElement.clientWidth || baseWidth;
          const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
          const naturalWidth = image.naturalWidth || baseWidth;
          const naturalHeight = image.naturalHeight || 0;

          if (fitMode === "contain" && naturalHeight > 0 && viewportHeight > 0) {
            const aspectRatio = naturalWidth / naturalHeight;
            return Math.max(1, Math.min(viewportWidth, viewportHeight * aspectRatio));
          }

          return Math.max(1, viewportWidth);
        }

        function fitImageAndHotspots() {
          const targetWidth = getTargetWidth();
          const scale = targetWidth / baseWidth;

          map.style.width = `${targetWidth}px`;

          hotspots.forEach((hotspot) => {
            const x = Number(hotspot.dataset.x) || 0;
            const y = Number(hotspot.dataset.y) || 0;
            const w = Number(hotspot.dataset.w) || 0;
            const h = Number(hotspot.dataset.h) || 0;

            hotspot.style.left = `${x * scale}px`;
            hotspot.style.top = `${y * scale}px`;
            hotspot.style.width = `${w * scale}px`;
            hotspot.style.height = `${h * scale}px`;
          });
        }

        function run() {
          fitImageAndHotspots();
          requestAnimationFrame(fitImageAndHotspots);
        }

        window.addEventListener("resize", run);
        window.addEventListener("orientationchange", run);

        if (image.complete) {
          run();
        } else {
          image.addEventListener("load", run, { once: true });
        }

        if ("ResizeObserver" in window) {
          new ResizeObserver(run).observe(document.documentElement);
        }
      })();
    </script>
  </body>
</html>
